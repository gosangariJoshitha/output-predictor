<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizTech Arena </title>
    <link rel="stylesheet" href="../frontend/style.css">
</head>
<body>
    <div class="container landing-page">
        <div class="landing-content">
            <div class="logo">
                <span class="code-bracket">&lt;</span>
                <span class="brand-text">QuizTech Arena</span>
                <span class="code-bracket">&gt;</span>
            </div>
            <h1>Test Your C & Python Output Skills</h1>
            <p class="subtitle">Master competitive programming with expert-crafted questions</p>
            
            <div class="button-group">
                <a href="login.html" class="btn btn-secondary">Login</a>

            </div>

            <div class="info-section">

                    <div class="info-icon">📝</div>
                    <h3>30 Questions</h3>
                    <p>Carefully curated questions</p>
                </div>
                <div class="info-card">
                    <div class="info-icon">⏱️</div>
                    <h3>30 Minutes</h3>
                    <p>Complete within time limit</p>
                </div>
                <div class="info-card">
                    <div class="info-icon">🏆</div>

                    <p>Compete with your peers</p>
                </div>
            </div>
        </div>
    </div>
