<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuizTech Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Login</h1>
            <p>Welcome Back</p>
        </div>

        <!-- Login Form -->
        <form class="form" onsubmit="login(event)">
            <div class="form-group">
                <label for="rollNo">Roll No</label>
                <input type="text" id="rollNo" required placeholder="Enter your roll number">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Login
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>
</div>

<script>
function login(e) {
    e.preventDefault(); // Prevent page reload

    const rollNo = document.getElementById("rollNo").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!rollNo || !password) {
        alert("Please enter roll number and password");
        return;
    }

    fetch("http://localhost:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ rollNo, password })
    })
    .then(res => res.json())
    .then(data => {

        if (!data.success) {
            alert(data.message);
            return;
        }

        // ADMIN LOGIN
        if (data.role === "admin") {
            localStorage.setItem("rollNo", "ADMIN");
            window.location = "admin.html";
            return;
        }

        // STUDENT LOGIN
        localStorage.setItem("name", data.name);
        localStorage.setItem("rollNo", data.rollNo);
        localStorage.setItem("year", data.year);

        window.location = "quiz.html";
    })
    .catch(err => {
        console.error("Login Error:", err);
        alert("Server error. Make sure backend is running.");
    });
}
</script>

</body>
</html>
